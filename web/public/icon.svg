<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Meridian — three interlocking gold rings">
<defs>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F8E7B0"/><stop offset="0.45" stop-color="#D9B24A"/><stop offset="1" stop-color="#A0741B"/></linearGradient>
  <pattern id="hatch" width="24" height="19.2" patternUnits="userSpaceOnUse"><line x1="0" y1="9.6" x2="24" y2="9.6" stroke="#D9B24A" stroke-width="4.8"/></pattern>
  <clipPath id="clip-a"><circle cx="152" cy="256" r="104"/></clipPath>
  <clipPath id="clip-b"><circle cx="256" cy="256" r="104"/></clipPath>
  <clipPath id="clip-c"><circle cx="360" cy="256" r="104"/></clipPath>
</defs>
<rect width="512" height="512" fill="#0c0f12"/>
<g clip-path="url(#clip-a)"><g clip-path="url(#clip-b)"><rect x="0" y="128" width="256" height="256" fill="url(#hatch)"/></g></g>
<g clip-path="url(#clip-b)"><g clip-path="url(#clip-c)"><rect x="256" y="128" width="256" height="256" fill="url(#hatch)"/></g></g>
<circle cx="152" cy="256" r="104" fill="none" stroke="url(#gold)" stroke-width="9"/>
<circle cx="256" cy="256" r="104" fill="none" stroke="url(#gold)" stroke-width="9"/>
<circle cx="360" cy="256" r="104" fill="none" stroke="url(#gold)" stroke-width="9"/>
</svg>
