<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Meridian — the Dominican Republic at the center of a golden world">
  <defs>
    <!-- Luxury gold gradients -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8E7B0"/>
      <stop offset="0.45" stop-color="#D9B24A"/>
      <stop offset="1" stop-color="#A0741B"/>
    </linearGradient>
    <radialGradient id="goldBright" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#FFF4CE"/>
      <stop offset="0.5" stop-color="#F0CC6A"/>
      <stop offset="1" stop-color="#C2922B"/>
    </radialGradient>
    <radialGradient id="tile" cx="0.5" cy="0.4" r="0.85">
      <stop offset="0" stop-color="#1d242c"/>
      <stop offset="1" stop-color="#0a0d10"/>
    </radialGradient>
    <radialGradient id="sphere" cx="0.42" cy="0.36" r="0.75">
      <stop offset="0" stop-color="#19222c"/>
      <stop offset="0.7" stop-color="#0f161d"/>
      <stop offset="1" stop-color="#0a0f14"/>
    </radialGradient>
    <radialGradient id="rim" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.82" stop-color="#C2922B" stop-opacity="0"/>
      <stop offset="0.97" stop-color="#F0CC6A" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#C2922B" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="globeClip"><circle cx="256" cy="256" r="168"/></clipPath>
  </defs>

  <!-- Dark luxury tile -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#tile)"/>
  <rect x="6" y="6" width="500" height="500" rx="112" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.5"/>

  <!-- Globe sphere -->
  <circle cx="256" cy="256" r="168" fill="url(#sphere)"/>

  <!-- Meridian graticule: longitude + latitude lines in gold -->
  <g clip-path="url(#globeClip)" fill="none" stroke="url(#gold)" stroke-width="1.6">
    <g opacity="0.42">
      <ellipse cx="256" cy="256" rx="168" ry="168"/>
      <ellipse cx="256" cy="256" rx="118" ry="168"/>
      <ellipse cx="256" cy="256" rx="58" ry="168"/>
      <line x1="256" y1="88" x2="256" y2="424"/>
    </g>
    <g opacity="0.30">
      <line x1="88" y1="256" x2="424" y2="256"/>
      <ellipse cx="256" cy="256" rx="168" ry="86"/>
      <ellipse cx="256" cy="256" rx="168" ry="150"/>
    </g>
  </g>

  <!-- Soft golden rim light -->
  <circle cx="256" cy="256" r="168" fill="url(#rim)"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="url(#gold)" stroke-width="3.5"/>

  <!-- Dominican Republic, glowing gold at the center of the world -->
  <g filter="url(#glow)">
    <path d="M210 252
             C214 242 230 238 248 240
             C258 234 276 235 288 242
             C302 242 314 247 309 254
             C313 262 296 266 282 263
             C272 270 251 270 239 264
             C225 266 211 262 210 256
             Z"
          fill="url(#goldBright)" stroke="#FFF4CE" stroke-width="1.5"/>
  </g>

  <!-- Flight arcs: one departing (up-left), one landing (down-right) -->
  <g fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <path d="M232 244 Q150 168 112 116" stroke-dasharray="2 13"/>
    <path d="M286 252 Q372 322 408 392" stroke-dasharray="2 13"/>
  </g>

  <!-- Departing jet (ascending, up-left) -->
  <g transform="translate(112 116) rotate(-48) scale(1.7)" fill="url(#goldBright)" stroke="#7a5a14" stroke-width="0.5">
    <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/>
  </g>
  <!-- Landing jet (descending toward DR, down-right) -->
  <g transform="translate(408 392) rotate(150) scale(1.7)" fill="url(#goldBright)" stroke="#7a5a14" stroke-width="0.5">
    <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/>
  </g>
</svg>
