<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-label="Meridian — Luxury Real Estate in the Dominican Republic">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8E7B0"/>
      <stop offset="0.45" stop-color="#D9B24A"/>
      <stop offset="1" stop-color="#A0741B"/>
    </linearGradient>
    <radialGradient id="goldBright" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#FFF4CE"/>
      <stop offset="0.5" stop-color="#F0CC6A"/>
      <stop offset="1" stop-color="#C2922B"/>
    </radialGradient>
    <radialGradient id="sphere" cx="0.42" cy="0.36" r="0.75">
