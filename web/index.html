<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ──────────────────────────────────────────────────── -->
    <title>Meridian — Luxury Real Estate in the Dominican Republic</title>
    <meta name="description" content="Browse luxury villas, condos, and investment properties for sale and rent across the Dominican Republic. Punta Cana, Santo Domingo, Las Terrenas and more." />
    <meta name="keywords" content="Dominican Republic real estate, luxury villas Punta Cana, DR property for sale, invest in Dominican Republic, Santo Domingo apartments, Cap Cana real estate" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="author" content="Meridian Real Estate" />

    <!-- ── Open Graph ────────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Meridian" />
    <meta property="og:title" content="Meridian — Luxury Real Estate in the Dominican Republic" />
    <meta property="og:description" content="Browse luxury villas, condos, and investment properties for sale and rent across the Dominican Republic." />
    <meta property="og:url" content="https://investwithmeridian.com" />
    <meta property="og:image" content="https://investwithmeridian.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_DO" />

    <!-- ── Twitter / X Card ─────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Meridian — Luxury Real Estate in the Dominican Republic" />
    <meta name="twitter:description" content="Browse luxury villas, condos, and investment properties for sale and rent across the Dominican Republic." />
    <meta name="twitter:image" content="https://investwithmeridian.com/og-image.jpg" />

    <!-- ── Canonical + hreflang alternates (EN/ES) ───────────────────────── -->
    <link rel="canonical" href="https://investwithmeridian.com" />
    <link rel="alternate" hreflang="en" href="https://investwithmeridian.com/?lang=en" />
    <link rel="alternate" hreflang="es" href="https://investwithmeridian.com/?lang=es" />
    <link rel="alternate" hreflang="x-default" href="https://investwithmeridian.com/" />

    <!-- ── Geo targeting (Dominican Republic) ──────────────────────────── -->
    <meta name="geo.region" content="DO" />
    <meta name="geo.country" content="DO" />
    <meta name="geo.placename" content="Santo Domingo, Dominican Republic" />
    <meta name="ICBM" content="18.4861, -69.9312" />

    <!-- ── PWA / Branding ───────────────────────────────────────────────── -->
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Meridian" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── Organization JSON-LD (site-wide) ─────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "@id": "https://investwithmeridian.com/#organization",
      "name": "Meridian Real Estate",
      "url": "https://investwithmeridian.com",
      "logo": "https://investwithmeridian.com/logo.svg",
      "description": "Premium real estate and investment platform for the Dominican Republic. Buy, sell, and rent luxury properties with confidence.",
      "areaServed": {
        "@type": "Country",
        "name": "Dominican Republic"
      },
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "email": "info@investwithmeridian.com",
          "contactType": "customer support",
          "availableLanguage": ["English", "Spanish"]
        },
        {
          "@type": "ContactPoint",
          "telephone": "+1-470-708-9223",
          "contactType": "customer support",
          "contactOption": "WhatsApp",
          "availableLanguage": ["English", "Spanish"]
        }
      ],
      "sameAs": [
        "https://www.instagram.com/meridian.dr",
        "https://www.facebook.com/meridiandr"
      ]
    }
    </script>

    <!-- ── WebSite + SearchAction JSON-LD (sitelinks search box) ─────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://investwithmeridian.com/#website",
      "name": "Meridian",
      "alternateName": "Meridian Real Estate — Dominican Republic",
      "url": "https://investwithmeridian.com",
      "inLanguage": ["en", "es"],
      "publisher": { "@id": "https://investwithmeridian.com/#organization" },
      "potentialAction": {
        "@type": "SearchAction",
        "target": { "@type": "EntryPoint", "urlTemplate": "https://investwithmeridian.com/search?q={search_term_string}" },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ── Fonts ─────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <body>
    <div id="root"></div>
